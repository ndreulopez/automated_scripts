name: News Briefing Automation

on:
  schedule:
    # Runs at 06:00 and 18:00 UTC on weekdays (Monday through Friday)
    - cron: '0 6,18 * * 1-5'
    # Runs at 08:00 UTC on weekends (Saturday and Sunday)
    - cron: '0 8 * * 0,6'
  workflow_dispatch: # Allows manual triggering from GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run News Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python news_script.py